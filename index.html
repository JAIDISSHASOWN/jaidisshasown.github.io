<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💨 Générateur de Prout 3000 - Édition SOLID 💨</title>
    <style>
        /* --- CSS INCHANGÉ MAIS ORGANISÉ --- */
        :root {
            --primary-bg: #a8ff78;
            --secondary-bg: #78ffd6;
            --btn-color: #8b4513;
            --btn-border: #5c4033;
            --text-main: #5c4033;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden; text-align: center; transition: background 0.3s;
        }

        /* États globaux */
        body.catastrophe { animation: alerteRouge 0.3s infinite !important; }
        .violent-shake { animation: violentShake 0.1s infinite; }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* Typographie */
        h1 { color: var(--text-main); font-size: 3rem; text-shadow: 2px 2px #fff; margin-bottom: 10px; z-index: 10; }
        #subtitle { color: #333; font-size: 1.5rem; margin-bottom: 30px; font-weight: bold; z-index: 10; }
        .score-container { color: var(--text-main); margin-top: 40px; z-index: 10; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px; }

        /* Bouton principal */
        #prout-btn {
            background-color: var(--btn-color); color: white; border: 5px solid var(--btn-border);
            border-radius: 50%; width: 250px; height: 250px; font-size: 2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 15px var(--btn-border), 0 20px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s; z-index: 10; user-select: none;
        }
        #prout-btn:active { transform: translateY(15px) scale(0.95); box-shadow: 0 0px var(--btn-border), 0 5px 10px rgba(0,0,0,0.5); background-color: #a0522d; }

        /* Particules */
        .gas { position: absolute; font-size: 4rem; pointer-events: none; animation: floatUp 2s ease-out forwards; z-index: 5; }
        .poop-rain { position: absolute; font-size: 5rem; pointer-events: none; animation: fallDown 1.5s linear forwards; z-index: 9999; }

        /* Alertes */
        .siren-text {
            position: fixed; font-size: 6vw; color: #ffff00; text-shadow: 5px 5px #000, -5px -5px #ff0000;
            font-weight: 900; z-index: 10000; pointer-events: none; display: none; top: 15%; left: 50%;
            transform: translateX(-50%); white-space: nowrap;
        }
        .siren-active { display: block; animation: panicText 0.2s infinite; }

        /* Mini-jeu */
        #minigame-container {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85); border: 8px dashed #ffeb3b; border-radius: 20px;
            padding: 40px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 15000; width: 80%; max-width: 500px;
        }
        #minigame-container h2 { color: #ffeb3b; margin-top: 0; font-size: 2rem; text-transform: uppercase; }
        #minigame-btn {
            background-color: #ff5722; color: white; border: 4px solid #fff; border-radius: 15px;
            padding: 20px 40px; font-size: 1.8rem; font-weight: bold; cursor: pointer; margin: 20px 0;
            box-shadow: 0 10px #bf360c; transition: transform 0.05s, box-shadow 0.05s; user-select: none;
        }
        #minigame-btn:active { transform: translateY(10px); box-shadow: 0 0px #bf360c; }
        #progress-bar-container { width: 100%; height: 40px; background-color: #333; border-radius: 20px; overflow: hidden; border: 3px solid #fff; }
        #progress-bar { width: 0%; height: 100%; background-color: #4caf50; transition: width 0.1s; }

        /* Keyframes */
        @keyframes alerteRouge { 0%, 100% { background: radial-gradient(circle, #ff0000 0%, #8b0000 100%); } 50% { background: radial-gradient(circle, #ff5555 0%, #3a0000 100%); } }
        @keyframes shake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 10px, 0) rotate(-2deg); } 40%, 60% { transform: translate3d(10px, -10px, 0) rotate(2deg); } }
        @keyframes violentShake { 0% { transform: translate(5px, 5px) rotate(0deg); } 25% { transform: translate(-5px, -5px) rotate(2deg); } 50% { transform: translate(-5px, 5px) rotate(-2deg); } 75% { transform: translate(5px, -5px) rotate(2deg); } 100% { transform: translate(5px, 5px) rotate(0deg); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; } 100% { transform: translateY(-500px) scale(2) rotate(180deg); opacity: 0; } }
        @keyframes fallDown { 0% { transform: translateY(-10vh) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) scale(2) rotate(360deg); opacity: 0; } }
        @keyframes panicText { 0% { transform: translateX(-52%) scale(1); } 50% { transform: translateX(-48%) scale(1.1); } 100% { transform: translateX(-50%) scale(1); } }
    </style>
</head>
<body>

    <div class="siren-text" id="siren-alert">🚨 ALERTE FUITE 🚨</div>

    <h1>💨 Le Générateur de Prout 3000 💨</h1>
    <div id="subtitle">Appuie si t'es un vrai.</div>

    <button id="prout-btn">LÂCHE LA CAISSE</button>

    <h2 class="score-container">Score de prouts : <span id="score">0</span></h2>

    <div id="minigame-container">
        <h2>RÉPARE LA FUITE !</h2>
        <p style="color: white; font-size: 1.2rem;">Clique frénétiquement pour refermer les vannes !</p>
        <button id="minigame-btn">🪠 SERRER LES FESSES 🪠</button>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>
        /**
         * Service responsable uniquement de la gestion audio (Single Responsibility)
         */
        class AudioService {
            constructor(sounds) {
                this.sounds = sounds;
                this.effortSound = 'https://www.soundjay.com/human/fart-08.mp3';
            }

            playRandomFart() {
                const url = this.sounds[Math.floor(Math.random() * this.sounds.length)];
                this._playSound(url, 1.0);
            }

            playEffortSound() {
                this._playSound(this.effortSound, 2.0);
            }

            _playSound(url, playbackRate) {
                const audio = new Audio(url);
                audio.playbackRate = playbackRate;
                audio.play().catch(() => console.warn("Interaction utilisateur requise pour l'audio."));
            }
        }

        /**
         * Gestionnaire des animations de particules (caca, gaz)
         */
        class ParticleSystem {
            spawnGas(x, y) {
                const numGas = Math.floor(Math.random() * 4) + 2; 
                for (let i = 0; i < numGas; i++) {
                    const gas = document.createElement('div');
                    gas.className = 'gas';
                    gas.innerText = '💨'; 
                    const offsetX = (Math.random() - 0.5) * 200;
                    
                    if (x && y) {
                        gas.style.left = `${x + offsetX - 30}px`;
                        gas.style.top = `${y - 30}px`;
                    } else {
                        gas.style.left = `calc(50% + ${offsetX}px)`;
                        gas.style.top = '50%';
                    }
                    
                    document.body.appendChild(gas);
                    setTimeout(() => gas.remove(), 2000);
                }
            }

            spawnPoop() {
                const poop = document.createElement('div');
                poop.className = 'poop-rain';
                poop.innerText = '💩';
                poop.style.left = `${Math.random() * 100}vw`;
                poop.style.transform = `scale(${Math.random() * 1.5 + 0.5})`;

                document.body.appendChild(poop);
                setTimeout(() => poop.remove(), 1500);
            }
        }

        /**
         * Gestionnaire de l'interface utilisateur (DOM manipulation)
         */
        class UIManager {
            constructor() {
                this.btn = document.getElementById('prout-btn');
                this.scoreElement = document.getElementById('score');
                this.subtitle = document.getElementById('subtitle');
                this.sirenAlert = document.getElementById('siren-alert');
                this.minigameContainer = document.getElementById('minigame-container');
                this.minigameBtn = document.getElementById('minigame-btn');
                this.progressBar = document.getElementById('progress-bar');
            }

            updateScore(score) {
                this.scoreElement.innerText = score;
            }

            updateSubtitle(text) {
                this.subtitle.innerText = text;
            }

            triggerShake() {
                document.body.classList.remove('shake');
                void document.body.offsetWidth; // Force reflow
                document.body.classList.add('shake');
            }

            changeRandomBackgroundColor() {
                const hue = Math.floor(Math.random() * 60) + 60;
                document.body.style.background = `radial-gradient(circle, hsl(${hue}, 100%, 70%) 0%, hsl(${hue - 30}, 100%, 40%) 100%)`;
            }

            resetBackgroundColor() {
                document.body.style.background = 'radial-gradient(circle, #a8ff78 0%, #78ffd6 100%)';
            }

            toggleCatastropheUI(isActive) {
                if (isActive) {
                    this.btn.style.display = 'none';
                    this.minigameContainer.style.display = 'flex';
                    document.body.classList.add('catastrophe', 'violent-shake');
                    this.sirenAlert.classList.add('siren-active');
                    this.updateSubtitle("ERREUR 404 : LE SLIP A CÉDÉ !!!");
                } else {
                    this.minigameContainer.style.display = 'none';
                    this.btn.style.display = 'block';
                    document.body.classList.remove('catastrophe', 'violent-shake');
                    this.sirenAlert.classList.remove('siren-active');
                    this.updateSubtitle("Ouf... Intervention réussie. Va te laver quand même.");
                    this.resetBackgroundColor();
                }
            }

            updateProgressBar(percentage) {
                this.progressBar.style.width = `${percentage}%`;
            }
        }

        /**
         * Moteur principal du jeu (Contrôleur) - Relie les composants (Dependency Inversion)
         */
        class GameEngine {
            constructor(audioService, uiManager, particleSystem) {
                this.audio = audioService;
                this.ui = uiManager;
                this.particles = particleSystem;
                
                this.score = 0;
                this.isCatastropheMode = false;
                this.clenchClicks = 0;
                this.requiredClicks = 15;
                this.catastropheIntervals = [];

                this.messages = [
                    "Oups, pardon !", "Ça sent le rat mort ici...", "Celle-là était bien grasse.",
                    "Tu as mangé des fayots à midi ?", "Silence radio, mais dégâts max.", "Le slip a pris un coup."
                ];

                this._bindEvents();
            }

            _bindEvents() {
                this.ui.btn.addEventListener('click', (e) => this.handleMainClick(e));
                this.ui.minigameBtn.addEventListener('click', () => this.handleMinigameClick());
            }

            handleMainClick(event) {
                if (this.isCatastropheMode) return;

                this.score++;
                this.ui.updateScore(this.score);

                // 15% de chance de fuite critique
                if (Math.random() < 0.5) {
                    this.triggerCatastrophe();
                } else {
                    this.executeNormalFart(event.clientX, event.clientY);
                }
            }

            executeNormalFart(x, y) {
                this.audio.playRandomFart();
                this.ui.triggerShake();
                this.ui.updateSubtitle(this.messages[Math.floor(Math.random() * this.messages.length)]);
                this.ui.changeRandomBackgroundColor();
                this.particles.spawnGas(x, y);
            }

            triggerCatastrophe() {
                this.isCatastropheMode = true;
                this.clenchClicks = 0;
                this.ui.updateProgressBar(0);
                this.ui.toggleCatastropheUI(true);

                // Démarrage des boucles infernales
                this.catastropheIntervals.push(setInterval(() => this.audio.playRandomFart(), 400));
                this.catastropheIntervals.push(setInterval(() => this.particles.spawnPoop(), 150));
            }

            handleMinigameClick() {
                if (!this.isCatastropheMode) return;
                
                this.clenchClicks++;
                const percentage = (this.clenchClicks / this.requiredClicks) * 100;
                this.ui.updateProgressBar(percentage);
                this.audio.playEffortSound();

                if (this.clenchClicks >= this.requiredClicks) {
                    this.resolveCatastrophe();
                }
            }

            resolveCatastrophe() {
                this.catastropheIntervals.forEach(clearInterval);
                this.catastropheIntervals = [];
                this.isCatastropheMode = false;
                this.ui.toggleCatastropheUI(false);
            }
        }

        // --- INITIALISATION (Point d'entrée) ---
        const fartSoundsDB = [
            'https://www.soundjay.com/human/fart-01.mp3',
            'https://www.soundjay.com/human/fart-02.mp3',
            'https://www.soundjay.com/human/fart-03.mp3',
            'https://www.soundjay.com/human/fart-06.mp3',
            'https://www.soundjay.com/human/fart-08.mp3'
        ];

        // Injection des dépendances
        const audioService = new AudioService(fartSoundsDB);
        const uiManager = new UIManager();
        const particleSystem = new ParticleSystem();
        
        // Lancement du jeu
        const game = new GameEngine(audioService, uiManager, particleSystem);
    </script>
</body>
</html>
